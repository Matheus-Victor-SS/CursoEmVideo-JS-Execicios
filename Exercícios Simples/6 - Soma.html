<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Input e DOM</title>
    <style>
        body{
            font: normal 20pt arial;
            background-color: greenyellow;
        }
        input{
            width: 200px;
            height: 40px;
            border-radius: 20px;
            border-color: lightgray;
        }
        #button{
            background-color: green;
            border-radius: 20px;
            border-color: rgb(11, 24, 11);
            font: normal 15pt a;
            color: white;
            margin-top: 20px;
        }
        div#resultado{
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <center>
    <h1>Somando valores</h1>
    <input type="number" name="Numero1" id="n1"><br>+<br>
    <input type="number" name="Numero2" id="n2"><br>
    <input type="button" value="Somar" id="button" onclick="somar()">
    <strong><div id="resultado"> Resultado</div></strong>
    </center>
    <script>
        var x=document.getElementById('resultado')
        function somar(){
            var input1= document.getElementById('n1')
            var input2= document.querySelector('input#n2')
            var n1 = Number(input1.value)
            var n2 = Number(input2.value)
            var res = n1+n2
            x.innerText=res
        }
    </script>
</body>
</html>
