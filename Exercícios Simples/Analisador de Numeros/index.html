    <section>
        <div>
    <p>Digite um número: (entre 0 e 100) <br>
        <input type="number" id="num" max="100" min="0">
    </p>   
    <input type="button" value="Salvar" id="btn" onclick="analisar()">
    </div>
    <div>
        <p id="res">Preencha os dados para ver os valores</p>
        <p id="res2"></p>
    </div>
    <input type="button" value="Finalizar" id="btn" onclick="finalizar()">
    <p id="final"></p>
    </section>
    <footer>
        Matheus V.
    </footer>
    <script src="script.js"></script>
</body>
</html>
