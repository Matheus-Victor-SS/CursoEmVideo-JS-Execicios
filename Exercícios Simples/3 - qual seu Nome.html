        body{
            font: normal 35pt Arial;
            background-color: rgb(157, 252, 255);
            color: rgb(0, 45, 143);

<body>
    <script>
        var nome = window.prompt('Qual é o seu nome? ')
        document.write(`Olá ${nome},<br> seu nome tem ${nome.length} letras<br><br>`)
        document.write(`Seu nome maiusculo é ${nome.toUpperCase()}<br>`)
        document.write(`Seu nome minusculo é ${nome.toLowerCase()}`)
    </script>
</body>
